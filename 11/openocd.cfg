# openocd.cfg - STM32-G071RB on Nucleo via on-board ST-Link

# 1. The probe: ST-Link/V2-1 on the Nucleo
source [find interface/stlink.cfg]
transport select hla_swd

# 2. The target: STM32G0 family
source [find target/stm32g0x.cfg]

# 3. Optional: slow down if we get connection errors
adapter speed 1800